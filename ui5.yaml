specVersion: "4.0"
metadata:
  name: siagrob1
type: application
framework:
  name: SAPUI5
  version: "1.141.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.table
    - name: sap.tnt
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.ui.fl
    - name: sap.ui.comp
    - name: sap.uxap
    - name: themelib_sap_horizon
    - name: themelib_sap_belize
    - name: themelib_sap_fiori_3
builder:
  resources:
    excludes:
      - "test/e2e/**"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
    - name: ui5-task-cachebuster-indexing
      afterTask: generateCachebusterInfo
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
    - name: ui5-middleware-livereload
      afterMiddleware: compression
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /odata
      configuration:
        baseUri: "http://localhost:50000/odata"
